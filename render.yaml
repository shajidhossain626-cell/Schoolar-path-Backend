services:
  - type: web
    name: scholarpath-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install --legacy-peer-deps && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: "5000"
      - key: SSLC_IS_LIVE
        value: "false"
